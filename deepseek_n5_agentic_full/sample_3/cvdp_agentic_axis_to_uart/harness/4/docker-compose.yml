networks:
  default:
    external: true
    name: cvdp-bridge-cvdp_v1-0-4_agentic_code_generation_no_commercial-ec
services:
  direct:
    build: .
    command: pytest -o cache_dir=/code/rundir/.cache /src/test_runner.py -v
