networks:
  default:
    external: true
    name: cvdp-bridge-cvdp_v1-0-4_agentic_code_generation_no_commercial-ec
services:
  direct:
    command: pytest -s --log-cli-level=INFO -o cache_dir=/rundir/harness/.cache /src/test_runner.py
      -v
    env_file: ./src/.env
    image: hdlc/sim:osvb
    volumes:
    - ./src/:/src/:ro
    working_dir: /code/rundir
