networks:
  default:
    external: true
    name: cvdp-bridge-cvdp_v1-0-4_agentic_code_generation_no_commercial-ec
services:
  des_dec:
    command: pytest /src/test_runner.py -s -v -o cache_dir=/rundir/harness/.cache
    env_file: ./src/.env_des_dec
    image: ghcr.io/hdl/sim/osvb
    volumes:
    - ./src:/src/
    working_dir: /code/rundir
  des_enc:
    command: pytest /src/test_runner.py -s -v -o cache_dir=/rundir/harness/.cache
    env_file: ./src/.env_des_enc
    image: ghcr.io/hdl/sim/osvb
    volumes:
    - ./src:/src/
    working_dir: /code/rundir
  sanity:
    command: pytest /src/test_runner.py -s -v -o cache_dir=/rundir/harness/.cache
    env_file: ./src/.env
    image: ghcr.io/hdl/sim/osvb
    volumes:
    - ./src:/src/
    working_dir: /code/rundir
