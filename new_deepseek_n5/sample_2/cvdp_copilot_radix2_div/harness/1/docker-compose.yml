networks:
  default:
    external: true
    name: cvdp-bridge-cvdp_v1-0-2_nonagentic_code_generation_no_commercial
services:
  direct:
    build: .
    command: pytest -o cache_dir=/code/rundir/.cache /src/test_runner.py -v
    env_file: ./src/.env
    volumes:
    - ./src/:/src/:ro
    working_dir: /code/rundir
